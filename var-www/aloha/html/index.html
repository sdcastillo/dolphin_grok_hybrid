<!DOCTYPE html>
<html>
<head>
    <title>ALOHA</title>
    <style>
        body {
            background: #0F172A;
            color: #D4AF37;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 120px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>ALOHA</h1>

    <script>
    (function() {
      function logVisit() {
        try {
          fetch("/log-visit", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({path: window.location.pathname})
          }).catch(function(){});
        } catch(e){}
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", logVisit);
      } else {
        logVisit();
      }
    })();
    </script>
</body>
</html>
